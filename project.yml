name: Splitr
options:
  bundleIdPrefix: com.zimalogistics
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

schemes:
  Splitr:
    build:
      targets:
        Splitr: all
        SplitrWidget: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Splitr:
    type: application
    platform: iOS
    sources:
      - Splitr
    dependencies:
      - target: SplitrWidget
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zimalogistics.splitr
        PRODUCT_NAME: Splitr
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Splitr/Info.plist
        DEVELOPMENT_TEAM: 58G8DR3YV6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Splitr/Splitr.entitlements

  SplitrWidget:
    type: app-extension
    platform: iOS
    sources:
      - SplitrWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: SplitrWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleDisplayName: SplitrWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zimalogistics.splitr.widget
        PRODUCT_NAME: SplitrWidget
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "5"
        DEVELOPMENT_TEAM: 58G8DR3YV6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: SplitrWidget/SplitrWidget.entitlements
